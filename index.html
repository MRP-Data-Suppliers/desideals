<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesiDeals — Best Deals in India</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .badge {
      display: inline-block;
      background: #ff6b00;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    h1 span { color: #ff6b00; }
    p {
      color: #aaa;
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .email-form {
      display: flex;
      gap: 0.5rem;
      max-width: 420px;
      margin: 0 auto 1.5rem;
    }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: #ff6b00; }
    button {
      padding: 0.75rem 1.5rem;
      background: #ff6b00;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }
    .features {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2.5rem;
    }
    .feature {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      font-size: 0.9rem;
      color: #ccc;
    }
    .feature span { display: block; font-size: 1.5rem; margin-bottom: 0.4rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <h1>Best Deals in India,<br /><span>All in One Place</span></h1>
    <p>
      We track prices across Amazon, Flipkart and more —
      so you never overpay again. Get notified when prices drop.
    </p>
    <div class="email-form">
      <input type="email" placeholder="Enter your email" />
      <button>Notify Me</button>
    </div>
    <div class="features">
      <div class="feature"><span>📉</span>Price History</div>
      <div class="feature"><span>🔔</span>Drop Alerts</div>
      <div class="feature"><span>🛒</span>All Stores</div>
      <div class="feature"><span>🇮🇳</span>India First</div>
    </div>
  </div>
  <footer>
    Contact: adarshrajsisodiya834@gmail.com
  </footer>
</body>
</html>
